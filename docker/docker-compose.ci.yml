# =============================================================================
# de.NBI Service Registry — CI Docker Compose
# =============================================================================
# Runs tests, linting, and security audit inside Docker.
# Tests use SQLite in-memory (config/settings_test.py) — no external services.
#
# Usage (from project root):
#   docker compose -f docker/docker-compose.ci.yml run --rm test
#   docker compose -f docker/docker-compose.ci.yml run --rm lint
#   docker compose -f docker/docker-compose.ci.yml run --rm audit
#   docker compose -f docker/docker-compose.ci.yml run --rm typecheck
# =============================================================================

services:

  test:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime
    command: pytest tests/ -v --tb=short --cov=apps --cov-report=term-missing --cov-report=xml
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings_test
      # settings_test.py uses SQLite/locmem — these are still required by
      # the base settings import but are not actually used for connections.
      - SECRET_KEY=ci-only-not-a-real-key
      - DB_PASSWORD=unused-in-test
      - REDIS_PASSWORD=unused-in-test
    volumes:
      - ../:/app
    networks:
      - ci

  lint:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime
    command: sh -c "ruff check apps/ config/ tests/ && ruff format --check apps/ config/ tests/"
    environment:
      - SECRET_KEY=ci
      - DB_PASSWORD=ci
      - REDIS_PASSWORD=ci
    volumes:
      - ../:/app
    networks:
      - ci

  audit:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime
    command: pip-audit -r requirements/production.txt
    networks:
      - ci

  typecheck:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime
    command: mypy apps/ config/
    environment:
      - SECRET_KEY=ci
      - DB_PASSWORD=ci
      - REDIS_PASSWORD=ci
    volumes:
      - ../:/app
    networks:
      - ci

networks:
  ci:
    driver: bridge
