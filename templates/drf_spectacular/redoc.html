<!DOCTYPE html>
<html>
  <head>
    {% block head %}
    <title>{{ title|default:"Redoc" }}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {# Google Fonts removed — no external CDN requests (GDPR). Redoc falls back to system fonts. #}
    <style>
      body { margin: 0; padding: 0; }
    </style>
    {% endblock head %}
  </head>
  <body>
    {% block body %}
    {% if settings %}
    <div id="redoc-container"></div>
    <script src="{{ redoc_standalone }}"></script>
    <script>
      const redocSettings = {{ settings|safe }};
      Redoc.init("{{ schema_url }}", redocSettings, document.getElementById('redoc-container'))
    </script>
    {% else %}
    <redoc spec-url="{{ schema_url }}"></redoc>
    <script src="{{ redoc_standalone }}"></script>
    {% endif %}
    {% endblock body %}
  </body>
</html>
