[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests/test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
; Add --cov=apps --cov-report=term-missing for coverage (requires pytest-cov)

; Use SQLite for test isolation (no PostgreSQL required for running tests)
[tool:pytest]
django_db_setup_databases = sqlite
