# =============================================================================
# de.NBI Service Registry — Site Configuration
# =============================================================================
#
# This file is the ONE PLACE to edit all non-secret site settings:
#   - Branding (name, logo, colours)
#   - Contact addresses and links
#   - External resource URLs (KPI docs, privacy policy, …)
#   - Email sender identity
#   - Feature flags
#
# What does NOT belong here:
#   - Passwords, secret keys, API tokens  → .env
#   - Database / Redis connection details → .env
#   - Infrastructure / deployment tuning → .env
#
# After editing this file, restart the web / worker containers:
#   docker compose restart web worker beat
#
# Format: TOML  https://toml.io/en/
# =============================================================================


# -----------------------------------------------------------------------------
# [site] — Core identity shown throughout the UI and emails
# -----------------------------------------------------------------------------
[site]

# Human-readable name used in page titles, email subjects, and the navbar.
name = "de.NBI Service Registry"

# Short tagline shown in the browser tab and meta description.
tagline = "de.NBI & ELIXIR-DE Service Registration System"

# The canonical public URL of this deployment (no trailing slash).
# Used in emails, API contact info, and the bio.tools client User-Agent.
url = "https://service-registry.denbi.de"

# Logo URL.  Three options:
#   1. An absolute URL:         "https://www.denbi.de/templates/nbimaster/img/denbi-logo-color.svg"
#   2. A local static path:     "/static/img/logo.svg"
#   3. Empty string:            ""   → renders the text fallback (de.NBI coloured text)
#
# To use a local file, place it at  static/img/logo.svg  (or .png) and set:
#   logo_url = "/static/img/logo.svg"
logo_url = "https://www.denbi.de/templates/nbimaster/img/denbi-logo-color.svg"

# Version string shown in the registration form header.
form_version = "1.1"
form_date    = "2026-02-14"


# -----------------------------------------------------------------------------
# [contact] — All contact addresses in one place
# -----------------------------------------------------------------------------
[contact]

# Primary coordination address — shown in form sidebars, footers, and emails.
email = "servicecoordination@denbi.de"

# Address displayed in the footer description line.
office = "Forschungszentrum Jülich GmbH - IBG-5, c/o Bielefeld University"

# Name of the organisation shown in the footer and emails.
organisation = "German Network for Bioinformatics Infrastructure"


# -----------------------------------------------------------------------------
# [email] — Sender identity (credentials stay in .env)
# -----------------------------------------------------------------------------
[email]

# The From address on all outbound emails.
# Overridden by the EMAIL_FROM env var if that is set.
from_address = "no-reply@denbi.de"

# Subject prefix prepended to all notification emails.
subject_prefix = "[de.NBI Service Registry]"


# -----------------------------------------------------------------------------
# [links] — External URLs referenced in the UI
# -----------------------------------------------------------------------------
[links]

# Main organisation website.
website = "https://www.denbi.de"

# Privacy policy page linked in the registration form and footer.
privacy_policy = "https://www.denbi.de/privacy-policy"

# Legal imprint linked in the footer.
imprint = "https://www.denbi.de/imprint"

# de.NBI data protection information page (linked in consent section of form).
data_protection = "https://www.denbi.de/privacy-policy"

# KPI cheat-sheet PDF linked in the KPI section of the form.
kpi_cheatsheet = "https://www.denbi.de/images/Service/20210624_KPI_Cheat_Sheet_doi.pdf"


# -----------------------------------------------------------------------------
# [api] — OpenAPI / Swagger metadata
# -----------------------------------------------------------------------------
[api]

# Title shown in the Swagger UI and ReDoc pages.
title = "de.NBI Service Registry API"

# API version string.
version = "1.0.0"

# License name shown in the OpenAPI schema.
license_name = "MIT"


# -----------------------------------------------------------------------------
# [features] — Toggle optional site features
# -----------------------------------------------------------------------------
[features]

# Show the bio.tools prefill banner on the registration form.
biotools_prefill = true

# Enable EDAM ontology annotation fields on the registration form.
edam_annotations = true

# Require hCaptcha / Turnstile on the registration form.
# Set to true only if HCAPTCHA_SITEKEY or TURNSTILE_SITEKEY is also configured.
captcha_enabled = false

# -----------------------------------------------------------------------------
# [edam] — EDAM Ontology sync settings
# -----------------------------------------------------------------------------
[edam]

# URL of the EDAM OWL file fetched by `manage.py sync_edam`.
# Overridden by the EDAM_OWL_URL env var if that is set (e.g. for air-gapped
# servers pointing to a local file path).
#
# To pin a specific release, change to e.g.:
#   owl_url = "https://edamontology.org/EDAM_1.25.owl"
# To use a local file (air-gapped):
#   owl_url = "/app/EDAM.owl"
owl_url = "https://edamontology.org/EDAM_stable.owl"


# -----------------------------------------------------------------------------
# [admin] — Django admin interface settings
# -----------------------------------------------------------------------------
[admin]

# URL path prefix for the Django admin interface.
# Obfuscating this reduces automated scanning noise; it is not a security
# boundary on its own — always require strong passwords and 2FA in production.
# Overridden by the ADMIN_URL_PREFIX env var if that is set.
#
# Example: setting url_prefix = "backstage" means the admin lives at /backstage/
url_prefix = "admin-denbi"
