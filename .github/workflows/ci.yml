# =============================================================================
# de.NBI Service Registry — GitHub Actions CI
# =============================================================================
# Triggers:
#   push   → main, develop
#   PR     → main
#   manual → workflow_dispatch (for release builds with a custom tag)
#
# Jobs:
#   test    pytest (SQLite) + ruff + pip-audit
#   build   docker buildx → push to private registry (main only)
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to push (e.g. v1.4.2)"
        required: false
        default: "latest"

env:
  IMAGE_NAME: denbi-registry
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}

jobs:

  #  Test
  test:
    name: Test, Lint & Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          load: true
          tags: denbi-registry:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Tests use SQLite in-memory (config/settings_test.py) — no db service needed.
      - name: Run pytest
        run: |
          docker run --rm \
            -e DJANGO_SETTINGS_MODULE=config.settings_test \
            -e SECRET_KEY="ci-only-not-a-real-key" \
            -e DB_PASSWORD="unused-in-test" \
            -e REDIS_PASSWORD="unused-in-test" \
            -v ${{ github.workspace }}:/app \
            denbi-registry:ci-test \
            pytest tests/ -v --tb=short --cov=apps --cov-report=xml

      # - name: Upload coverage report
      #   uses: codecov/codecov-action@v4
      #   if: always()
      #   with:
      #     file: coverage.xml
      #     fail_ci_if_error: false

      - name: Ruff lint
        run: |
          docker run --rm \
            -e SECRET_KEY=ci -e DB_PASSWORD=ci -e REDIS_PASSWORD=ci \
            -v ${{ github.workspace }}:/app \
            denbi-registry:ci-test \
            ruff check apps/ config/ tests/

      - name: Ruff format check
        run: |
          docker run --rm \
            -e SECRET_KEY=ci -e DB_PASSWORD=ci -e REDIS_PASSWORD=ci \
            -v ${{ github.workspace }}:/app \
            denbi-registry:ci-test \
            ruff format --check apps/ config/ tests/

      - name: pip-audit
        run: |
          docker run --rm \
            denbi-registry:ci-test \
            pip-audit -r requirements/production.txt

