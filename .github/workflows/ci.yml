# =============================================================================
# de.NBI Service Registry — GitHub Actions CI
# =============================================================================
# Triggers:
#   push   → main, develop
#   PR     → main
#   manual → workflow_dispatch (for release builds with a custom tag)
#
# Jobs:
#   test    pytest (SQLite) + ruff + pip-audit  — runs natively, no Docker
#   build   docker buildx → validates image builds; push to registry (main only)
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to push (e.g. v1.4.2)"
        required: false
        default: "latest"

env:
  IMAGE_NAME: denbi-registry
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}

jobs:

  #  Test, Lint & Audit — native Python, no Docker required
  test:
    name: Test, Lint & Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/development.txt

      - name: Install dependencies
        run: pip install -r requirements/development.txt

      - name: Run pytest
        env:
          DJANGO_SETTINGS_MODULE: config.settings_test
          SECRET_KEY: ci-only-not-a-real-key
          DB_PASSWORD: unused-in-test
          REDIS_PASSWORD: unused-in-test
        run: pytest tests/ -v --tb=short --cov=apps --cov-report=xml

      # - name: Upload coverage report
      #   uses: codecov/codecov-action@v4
      #   if: always()
      #   with:
      #     file: coverage.xml
      #     fail_ci_if_error: false

      - name: Ruff lint
        run: ruff check apps/ config/ tests/

      - name: Ruff format check
        run: ruff format --check apps/ config/ tests/

      - name: pip-audit
        run: pip-audit -r requirements/production.txt

