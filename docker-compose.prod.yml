# =============================================================================
# de.NBI Service Registry — Production Docker Compose Overrides
# =============================================================================
# Merge with base compose for production:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Production assumptions:
#   - PostgreSQL is managed externally (set DB_HOST in .env to your server)
#   - Nginx / TLS termination is handled by the host (not a container)
#   - Redis runs in Docker (web, worker, beat all share the same stack)
#
# Only web, worker, beat, and redis services are managed here.
# =============================================================================

services:

  web:
    build:
      target: runtime
    command: >
      gunicorn config.wsgi:application
        --bind 0.0.0.0:8000
        --workers 4
        --worker-class sync
        --timeout 60
        --keep-alive 5
        --forwarded-allow-ips "${FORWARDED_ALLOW_IPS:-127.0.0.1}"
        --access-logfile -
        --error-logfile -
    environment:
    ports:
      # nginx is on a separate server — bind on all interfaces, restrict with
      # firewall rules to only allow connections from the nginx server's IP.
      - "0.0.0.0:8000:8000"
    volumes:
      - static_vol:/app/staticfiles
    restart: always

  worker:
    command: celery -A config worker --loglevel=info --concurrency=4
    environment:
    volumes: []
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout=5 --destination=celery@$$HOSTNAME | grep -q OK"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 3

  beat:
    command: >
      celery -A config beat
        --loglevel=info
        --schedule /var/run/celerybeat/celerybeat-schedule
    environment:
    volumes: []
    restart: always
    healthcheck:
      disable: true

volumes:
  static_vol:
  celery_beat:
