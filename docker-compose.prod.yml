# =============================================================================
# de.NBI Service Registry — Production Docker Compose Overrides
# =============================================================================
# Merge with base compose for local staging / CI image validation:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# IMPORTANT: The live production environment is managed by Ansible.
# The Ansible template (roles/registry/templates/docker-compose.yml.j2) is
# the authoritative production configuration. This overlay exists for:
#   - Local staging runs that mirror production behaviour
#   - CI validation of the production image path
#
# Key differences from development (docker-compose.yml):
#   - PostgreSQL is external — no db service
#   - Static files are baked into the image — no static_vol
#   - Gunicorn replaces runserver
#   - No source bind-mount (no live code reload)
#   - SKIP_MIGRATE=true on worker and beat (only web runs migrations)
# =============================================================================

services:

  web:
    build:
      target: runtime
    command: >
      gunicorn config.wsgi:application
        --bind 0.0.0.0:8000
        --workers 4
        --worker-class sync
        --timeout 60
        --keep-alive 5
        --worker-tmp-dir /dev/shm
        --forwarded-allow-ips "${FORWARDED_ALLOW_IPS}"
        --access-logfile -
        --error-logfile -
    environment:
    ports:
      - "0.0.0.0:8000:8000"
    volumes: []    # No bind-mount — static files are baked into the image
    restart: always

  worker:
    command: celery -A config worker --loglevel=info --concurrency=4
    environment:
      - SKIP_MIGRATE=true    # Only web runs migrations to avoid startup race
    volumes: []
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout=5 --destination=celery@$$HOSTNAME | grep -q OK"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 3

  beat:
    command: >
      celery -A config beat
        --loglevel=info
        --schedule /var/run/celerybeat/celerybeat-schedule
    environment:
      - SKIP_MIGRATE=true    # Only web runs migrations to avoid startup race
    volumes: []
    restart: always
    healthcheck:
      disable: true

volumes:
  celery_beat:
