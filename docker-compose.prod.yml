# =============================================================================
# de.NBI Service Registry — Production Docker Compose Overrides
# =============================================================================
# Merge with base:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# KEY DIFFERENCE FROM docker-compose.yml
# The Docker Nginx binds to 127.0.0.1 only. The host-level Nginx (see
# nginx/host/registry.denbi.de.conf) terminates TLS and proxies here.
# No port is exposed directly to 0.0.0.0 from this stack.
# =============================================================================

services:

  web:
    build:
      target: runtime
    command: >
      gunicorn config.wsgi:application
        --bind 0.0.0.0:8000
        --workers 4
        --worker-class sync
        --timeout 60
        --keep-alive 5
        --access-logfile -
        --error-logfile -
    environment:
    ports: []                 # Web is NOT exposed; only nginx proxies to it
    volumes:
      - static_vol:/app/staticfiles
    restart: always

  worker:
    command: celery -A config worker --loglevel=info --concurrency=4
    environment:
    volumes: []
    restart: always

  beat:
    command: >
      celery -A config beat
        --loglevel=info
        --schedule /var/run/celerybeat/celerybeat-schedule
    environment:
    volumes: []
    restart: always

  # ---------------------------------------------------------------------------
  # Docker Nginx — listens on 127.0.0.1 only
  # The host Nginx (nginx/host/registry.denbi.de.conf) proxies here.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8080:80"    # HTTP only — host Nginx handles TLS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_vol:/app/staticfiles:ro
    depends_on:
      - web
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health/live/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  static_vol:
  celery_beat:
