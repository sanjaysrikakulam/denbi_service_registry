# =============================================================================
# .github/workflows/ci.yml — de.NBI Service Registry CI
# =============================================================================
# Triggers:
#   push   → main, develop
#   PR     → main
#   manual → workflow_dispatch (for release builds with custom tag)
#
# Jobs:
#   test      pytest + ruff + pip-audit
#   build     docker buildx → push to private registry (main branch only)
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to push (e.g. v1.4.2)"
        required: false
        default: "latest"

env:
  IMAGE_NAME: denbi-registry
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}

jobs:

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test, Lint & Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image (cached)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          load: true
          tags: denbi-registry:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run pytest
        run: |
          docker run --rm \
            -e SECRET_KEY="ci-only-secret-key" \
            -e DB_PASSWORD="ci" \
            -e REDIS_PASSWORD="ci" \
            -e DEBUG="true" \
            -e CAPTCHA_ENABLED="false" \
            -e CELERY_TASK_ALWAYS_EAGER="True" \
            -v ${{ github.workspace }}:/app \
            denbi-registry:ci-test \
            sh -c "python manage.py migrate --run-syncdb -v 0 2>&1 | tail -3 &&
                   pytest tests/ -v --tb=short --cov=apps --cov-report=xml"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

      - name: Ruff lint
        run: |
          docker run --rm \
            -e SECRET_KEY="ci" -e DB_PASSWORD="ci" -e REDIS_PASSWORD="ci" \
            -v ${{ github.workspace }}:/app \
            denbi-registry:ci-test \
            ruff check apps/ config/ tests/

      - name: Ruff format check
        run: |
          docker run --rm \
            -e SECRET_KEY="ci" -e DB_PASSWORD="ci" -e REDIS_PASSWORD="ci" \
            -v ${{ github.workspace }}:/app \
            denbi-registry:ci-test \
            ruff format --check apps/ config/ tests/

      - name: pip-audit
        run: |
          docker run --rm \
            denbi-registry:ci-test \
            pip-audit -r requirements/production.txt

  # ── Build & Push ──────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only push on main branch (not PRs, not develop)
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Determine image tags
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          TAG="${{ github.event.inputs.image_tag || 'latest' }}"
          FULL="${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}"
          echo "sha_tag=${FULL}:${SHA}" >> "$GITHUB_OUTPUT"
          echo "named_tag=${FULL}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.named_tag }}
          labels: |
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=registry,ref=${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Summary
        run: |
          echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **SHA tag** | \`${{ steps.meta.outputs.sha_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Named tag** | \`${{ steps.meta.outputs.named_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | ${{ steps.meta.outputs.sha }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "To deploy:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "IMAGE_TAG=${{ steps.meta.outputs.sha }} ansible-playbook \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  -i inventory/hosts.ini playbooks/site.yml \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --ask-vault-pass --tags deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
