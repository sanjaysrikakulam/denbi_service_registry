# =============================================================================
# de.NBI Service Registry — Docker-internal Nginx Configuration
# =============================================================================
#
# This Nginx runs INSIDE Docker and is reachable only from 127.0.0.1:8080
# on the host. TLS is terminated by the HOST-level Nginx (see
# nginx/host/registry.denbi.de.conf). All traffic arriving here is already
# decrypted; the X-Forwarded-Proto: https header is set by the host Nginx.
#
# Responsibilities of this layer:
#   - Rate limiting and connection limits within the Docker network
#   - Static file serving from the shared Docker volume
#   - Reverse proxy to Gunicorn (web:8000)
#   - Security headers (belt-and-braces; also set by host Nginx)
#   - Request size limits
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    'rt=$request_time xfwd=$http_x_forwarded_for';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    server_tokens off;

    # --------------------------------------------------------------------------
    # DDoS / abuse — connection and request rate limits
    # --------------------------------------------------------------------------
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_req_zone  $binary_remote_addr zone=req_limit:10m  rate=60r/m;
    limit_req_zone  $binary_remote_addr zone=form_limit:10m rate=10r/m;

    client_max_body_size  64k;
    client_body_timeout   10s;
    client_header_timeout 10s;
    send_timeout          30s;
    keepalive_timeout     65s;

    # --------------------------------------------------------------------------
    # Upstream — Gunicorn
    # --------------------------------------------------------------------------
    upstream django {
        server web:8000;
        keepalive 32;
    }

    # --------------------------------------------------------------------------
    # HTTP server (Docker-internal; the host Nginx sends HTTP here)
    # --------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        limit_conn conn_limit 20;
        limit_req  zone=req_limit burst=20 nodelay;

        # Security headers (duplicate what host Nginx sets — defence in depth)
        add_header X-Content-Type-Options  "nosniff" always;
        add_header X-Frame-Options         "DENY" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

        # Static files — served directly, bypasses Django entirely
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Form submission — stricter rate limit
        location ~ ^/(register|update)/ {
            limit_req zone=form_limit burst=5 nodelay;
            proxy_pass http://django;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # Health checks — no rate limit, no logging
        location /health/ {
            proxy_pass http://django;
            include /etc/nginx/conf.d/proxy_params.conf;
            access_log off;
        }

        # Everything else
        location / {
            proxy_pass http://django;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # Custom 429 page
        error_page 429 @rate_limited;
        location @rate_limited {
            default_type application/json;
            add_header Retry-After 60 always;
            return 429 '{"error": "Rate limit exceeded. Please wait before retrying.", "retry_after": 60}';
        }
    }
}
