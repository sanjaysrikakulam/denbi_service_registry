# =============================================================================
# /etc/nginx/snippets/proxy_to_docker.conf
# =============================================================================
# Shared proxy settings for all location blocks forwarding to Docker Nginx.
# Install at: cp nginx/host/proxy_to_docker.conf /etc/nginx/snippets/
#
# Included via:  include /etc/nginx/snippets/proxy_to_docker.conf;
# =============================================================================

# Tell the upstream (Docker Nginx → Django) the original host and protocol.
# Django uses these to build absolute URLs and enforce ALLOWED_HOSTS.
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Port  $server_port;

# Strip the Authorization header from access logs (prevent key leakage).
# The header value is still forwarded to Django — only the log entry is scrubbed.
proxy_hide_header Authorization;

# HTTP/1.1 + keepalive to the Docker Nginx upstream
proxy_http_version 1.1;
proxy_set_header   Connection "";

# Timeouts
proxy_connect_timeout  10s;
proxy_send_timeout     30s;
proxy_read_timeout     60s;

# Buffering: on for normal responses, off is fine too for a small app
proxy_buffering    on;
proxy_buffer_size  8k;
proxy_buffers      8 8k;

# Pass through the request ID generated by Docker-side middleware
proxy_pass_header X-Request-ID;
