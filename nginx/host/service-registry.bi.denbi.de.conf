# de.NBI Service Registry — External Reverse Proxy Vhost
# Managed by Ansible

# Upstream definition
# Define the Gunicorn backend once; referenced in all location blocks below.
# keepalive maintains a pool of persistent connections to avoid TCP handshake
# overhead on every request.

upstream registry_backend {
    server 192.168.232.66:8000;
    keepalive 32;
}

# =============================================================================
# HTTP → HTTPS redirect
# =============================================================================

server {
    listen      80;
    server_name service-registry.bi.denbi.de;

    # Let's Encrypt HTTP-01 challenge — must be reachable over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }

    # Redirect everything else to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS — main vhost
# =============================================================================

server {
    listen      443 ssl http2;
    server_name service-registry.bi.denbi.de;

    # Logging
    access_log /var/log/nginx/denbi_service_registry_access.log main;
    error_log  /var/log/nginx/denbi_service_registry_error.log warn;

    # TLS certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/crate.bi.denbi.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crate.bi.denbi.de/privkey.pem;

    # TLS hardening
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    # Session resumption — reduces handshake overhead for repeat visitors.
    ssl_session_timeout 1d;
    ssl_session_tickets off;    # tickets have forward-secrecy issues; disable

    # OCSP stapling — server fetches and caches the cert status response,
    # so clients don't need a separate round-trip to the CA.
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # Security headers
    # HSTS — tells browsers to always use HTTPS for this domain.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "DENY" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

    # Content-Security-Policy is set by the Django application via django-csp
    # (see config/settings.py → CONTENT_SECURITY_POLICY). No need to duplicate it here.

    # Hide the upstream server version.
    proxy_hide_header Server;
    server_tokens off;

    # Connection and request limits
    # limit_conn registry_conn 30;
    # limit_req  zone=registry_global burst=30 nodelay;

    # Body size — no file uploads; 64k covers the largest form.
    client_max_body_size  64k;
    client_body_timeout   15s;
    client_header_timeout 15s;
    send_timeout          30s;
    keepalive_timeout     75s;

    # Shared proxy parameters
    proxy_http_version 1.1;
    proxy_set_header Connection        "";          # enable keepalive to upstream
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;     # Django reads this via SECURE_PROXY_SSL_HEADER
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Request-ID      $request_id;

    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Buffering — enable so slow clients don't hold Gunicorn workers open.
    proxy_buffering         on;
    proxy_buffer_size       8k;
    proxy_buffers           8 8k;
    proxy_busy_buffers_size 16k;

    # Locations

    # Health check — no rate limit, no access log.
    location /health/ {
        proxy_pass http://registry_backend;
        access_log off;
        proxy_connect_timeout 5s;
        proxy_read_timeout    5s;
    }

    # API endpoints
    location /api/ {
        # limit_req zone=registry_api burst=40 nodelay;
        proxy_pass http://registry_backend;
        proxy_read_timeout 60s;
    }

    # Form submission endpoints — strictest rate limit.
    location ~ ^/(register|update)/ {
        # limit_req zone=registry_forms burst=5 nodelay;
        proxy_pass http://registry_backend;
    }

    # Admin — optional IP allowlist.
    # Uncomment and set to your campus/VPN ranges to restrict admin access:
    #
    # location /admin-denbi/ {
    #     allow 134.94.0.0/16;    # FZ Jülich campus
    #     allow 10.0.0.0/8;       # VPN
    #     deny  all;
    #     proxy_pass http://registry_backend;
    # }

    # Static files — served via WhiteNoise through Gunicorn.
    # Nginx caches the response headers; WhiteNoise sets long Cache-Control headers.
    location /static/ {
        proxy_pass http://registry_backend;
        proxy_cache_valid 200 1y;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # Everything else — standard proxy.
    location / {
        proxy_pass http://registry_backend;
    }

    # Custom error pages served by Nginx when the backend is unreachable.
    error_page 502 503 504 deNBI_service_registry_50X_error_page.html;
    location /errors/ {
        root /var/www/nginx-errors;
        internal;
    }

    # Deny dot-files and common scanner bait.
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|git|svn|htaccess|htpasswd|ini|log|sh|sql|bak)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
