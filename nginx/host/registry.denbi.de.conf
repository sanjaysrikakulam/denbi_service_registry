# =============================================================================
# de.NBI Service Registry — External Host Nginx Virtual Host
# =============================================================================
#
# PURPOSE
# -------
# This file lives on the HOST machine's Nginx (typically at
#   /etc/nginx/sites-available/registry.denbi.de.conf
# and symlinked to /etc/nginx/sites-enabled/).
#
# It is SEPARATE from the Nginx running inside Docker.
# The traffic path is:
#
#   Internet → Host Nginx (this file, port 80/443)
#              → Docker Nginx (container, port 8080 on host)
#              → Django/Gunicorn (container, port 8000, internal network only)
#
# WHY TWO NGINX LAYERS?
# ---------------------
# The host Nginx handles:
#   - Let's Encrypt TLS certificate management (certbot touches /var/www/certbot)
#   - Institutional firewall / WAF integration
#   - Other vhosts on the same machine (e.g. other lab services)
#   - IP allowlisting for admin access if needed
#
# The Docker Nginx handles:
#   - Internal rate limiting (conn/req limits in Docker network)
#   - Static file serving from the Docker volume
#   - Proxying to Gunicorn
#
# INSTALLATION
# ------------
# 1. Install Nginx on the host: apt install nginx
# 2. Copy this file:
#      cp nginx/host/registry.denbi.de.conf \
#         /etc/nginx/sites-available/registry.denbi.de.conf
# 3. Enable it:
#      ln -s /etc/nginx/sites-available/registry.denbi.de.conf \
#             /etc/nginx/sites-enabled/
# 4. Obtain TLS certificate (before enabling HTTPS block):
#      certbot certonly --webroot -w /var/www/certbot -d registry.denbi.de
# 5. Test and reload:
#      nginx -t && systemctl reload nginx
#
# DOCKER COMPOSE REQUIREMENT
# --------------------------
# In docker-compose.prod.yml, the Docker Nginx must expose its port
# to localhost only (not 0.0.0.0) so it is not directly reachable
# from outside the host:
#
#   nginx:
#     ports:
#       - "127.0.0.1:8080:80"    # HTTP  — host Nginx proxies here
#       - "127.0.0.1:8443:443"   # HTTPS — NOT used; host Nginx terminates TLS
#
# Only expose port 8080 (HTTP to Docker Nginx). TLS is terminated here on the host.
# =============================================================================

# ---- Rate limiting zones (host-level, before traffic enters Docker) --------
# These are coarse filters. Fine-grained limits live in the Docker Nginx.
limit_conn_zone $binary_remote_addr zone=host_conn:10m;
limit_req_zone  $binary_remote_addr zone=host_req:10m rate=60r/m;

# ---- Upstream: Docker Nginx on localhost:8080 ------------------------------
upstream docker_nginx {
    server 127.0.0.1:8080;
    keepalive 16;
}

# ============================================================================
# HTTP server — redirect to HTTPS + serve ACME challenge for certbot
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name registry.denbi.de;

    # Let's Encrypt / certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Everything else → permanent redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================================
# HTTPS server — TLS termination + proxy to Docker Nginx
# ============================================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name registry.denbi.de;

    # --------------------------------------------------------------------------
    # TLS — managed by certbot / Let's Encrypt
    # --------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/registry.denbi.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/registry.denbi.de/privkey.pem;

    # Use Mozilla Intermediate compatibility profile (TLS 1.2 + 1.3)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;   # Let client choose from the allowed set
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:'
                'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:'
                'ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (host Nginx resolves OCSP, caches response)
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/registry.denbi.de/chain.pem;
    resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # --------------------------------------------------------------------------
    # Connection and rate limits at host level
    # --------------------------------------------------------------------------
    limit_conn host_conn 40;           # Max 40 concurrent connections per IP
    limit_req  zone=host_req burst=30 nodelay;

    # --------------------------------------------------------------------------
    # Request limits (defence-in-depth; Docker Nginx applies its own limits too)
    # --------------------------------------------------------------------------
    client_max_body_size  64k;         # No file uploads; 64k covers largest form
    client_body_timeout   15s;
    client_header_timeout 15s;
    send_timeout          30s;
    keepalive_timeout     75s;

    # --------------------------------------------------------------------------
    # Security headers — applied at the outermost layer
    # These supplement (not replace) headers set by the Django application.
    # --------------------------------------------------------------------------
    add_header Strict-Transport-Security
        "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "DENY" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy
        "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;

    # Remove the upstream Server header to avoid leaking software versions
    proxy_hide_header Server;
    server_tokens off;

    # --------------------------------------------------------------------------
    # Access control — optional IP allowlist for the admin path
    # Uncomment and adjust to restrict admin access to your campus network.
    # --------------------------------------------------------------------------
    # location ~ ^/admin-denbi/ {
    #     allow 134.94.0.0/16;   # Forschungszentrum Jülich campus
    #     allow 129.206.0.0/16;  # DKFZ Heidelberg example
    #     deny all;
    #     proxy_pass http://docker_nginx;
    #     include /etc/nginx/snippets/proxy_to_docker.conf;
    # }

    # --------------------------------------------------------------------------
    # Health check endpoint — no rate limit, no auth, not logged
    # --------------------------------------------------------------------------
    location /health/ {
        proxy_pass http://docker_nginx;
        include /etc/nginx/snippets/proxy_to_docker.conf;
        access_log off;
    }

    # --------------------------------------------------------------------------
    # Let's Encrypt renewal (certbot places challenges here)
    # --------------------------------------------------------------------------
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # --------------------------------------------------------------------------
    # All other requests — forward to Docker Nginx
    # --------------------------------------------------------------------------
    location / {
        proxy_pass http://docker_nginx;
        include /etc/nginx/snippets/proxy_to_docker.conf;
    }

    # --------------------------------------------------------------------------
    # Custom error pages (served from host Nginx if Docker is down)
    # --------------------------------------------------------------------------
    error_page 502 503 504 /errors/upstream_down.html;
    location /errors/ {
        root /var/www/denbi-registry;
        internal;
    }
}
